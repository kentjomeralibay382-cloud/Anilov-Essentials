<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anilov' Essentials</title>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:#222; color:white; text-align:center; padding:15px; }
nav { background:#333; text-align:center; padding:10px; }
nav a { color:white; margin:0 10px; cursor:pointer; font-weight:bold; }
section { display:none; padding:20px; }
.active { display:block; }
.container { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
.product { background:white; padding:10px; border-radius:10px; text-align:center; }
.product img { width:100%; height:160px; object-fit:cover; border-radius:10px; }
</style>
</head>

<body>

<header>
<h1>Anilov' Essentials</h1>
</header>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('about')">About</a>
<a onclick="show('products')">Products</a>
<a onclick="show('contact')">Contact</a>
</nav>

<section id="home" class="active">
<h2>Welcome</h2>
<p>Simple demo store.</p>
</section>

<section id="about">
<h2>About</h2>
<p>Educational website project.</p>
</section>

<section id="products">
<h2>Products</h2>

<div class="container">

<div class="product">
<img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200'><rect width='100%' height='100%' fill='lightgray'/><text x='50%' y='50%' font-size='20' text-anchor='middle' fill='black'>Face Mask</text></svg>">
<h3>Face Mask</h3>
<p>₱50</p>
</div>

<div class="product">
<img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200'><rect width='100%' height='100%' fill='lightgray'/><text x='50%' y='50%' font-size='20' text-anchor='middle' fill='black'>Sanitizer</text></svg>">
<h3>Hand Sanitizer</h3>
<p>₱120</p>
</div>

<div class="product">
<img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200'><rect width='100%' height='100%' fill='lightgray'/><text x='50%' y='50%' font-size='20' text-anchor='middle' fill='black'>Toothpaste</text></svg>">
<h3>Toothpaste</h3>
<p>₱80</p>
</div>

<div class="product">
<img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200'><rect width='100%' height='100%' fill='lightgray'/><text x='50%' y='50%' font-size='20' text-anchor='middle' fill='black'>Shampoo</text></svg>">
<h3>Shampoo</h3>
<p>₱150</p>
</div>

</div>
</section>

<section id="contact">
<h2>Contact</h2>
<p>Email: anilovrivera05@gmail.com</p>
<p>Phone: 09244329315</p>
</section>

<footer style="text-align:center;padding:10px;background:#222;color:white;">
© 2026 Anilov' Essentials
</footer>

<script>
function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
