<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Anilov' Essentials</title>
<style>
<style>
body { 
  font-family: Arial; 
  margin:0; 
  background:#f5f5f5; 
}
/* HEADER */
header { 
  background:#222; 
  color:white; 
  text-align:center; 
  padding:15px; 
}

/* NAV */
nav { 
  background:#333; 
  text-align:center; 
  padding:10px; 
}

nav a { 
  color:white; 
  margin:0 10px; 
  cursor:pointer; 
  font-weight:bold; 
  display:inline-block;
}

/* SECTIONS */
section { 
  display:none; 
  padding:20px; 
}

.active { 
  display:block; 
}

/* PRODUCT GRID (DESKTOP DEFAULT) */
.container { 
  display:grid; 
  grid-template-columns:repeat(4, 1fr); 
  gap:15px; 
}

/* PRODUCT CARD */
.product { 
  background:white; 
  padding:10px; 
  border-radius:10px; 
  text-align:center; 
}

/* IMAGE */
.product img { 
  width:100%; 
  height:160px; 
  object-fit:cover; 
  border-radius:10px; 
}

/* FOOTER */
footer { 
  text-align:center;
  padding:10px;
  background:#222;
  color:white;
}

/* 📱 TABLET */
@media (max-width: 768px) {
  .container {
    grid-template-columns: repeat(2, 1fr);
  }

  nav a {
    margin: 5px;
  }
}

/* 📱 PHONE */
@media (max-width: 480px) {
  .container {
    grid-template-columns: 1fr;
  }

  nav {
    font-size: 14px;
  }

  .product img {
    height: 140px;
  }
}
</style>
</head>

<body>

<header>
<h1>Anilov' Essentials</h1>
</header>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('about')">About</a>
<a onclick="show('products')">Products</a>
<a onclick="show('contact')">Contact</a>
</nav>

<section id="home" class="active">
<h2>Welcome</h2>
<p>Simple demo store.</p>
</section>

<section id="about">
<h2>About</h2>
<p>Educational website project.</p>
</section>

<section id="products">
  <h2>Products</h2>

  <div class="container">

    <!-- Face Mask -->
    <div class="product">
      <img src="https://images.pexels.com/photos/3952245/pexels-photo-3952245.jpeg" alt="Face Mask">
      <h3>Face Mask</h3>
      <p>₱50</p>
    </div>

    <!-- Hand Sanitizer -->
    <div class="product">
      <img src="https://images.pexels.com/photos/3737596/pexels-photo-3737596.jpeg" alt="Hand Sanitizer">
      <h3>Hand Sanitizer</h3>
      <p>₱120</p>
    </div>

    <!-- Toothpaste -->
    <div class="product">
      <img src="https://images.pexels.com/photos/4465127/pexels-photo-4465127.jpeg" alt="Toothpaste">
      <h3>Toothpaste</h3>
      <p>₱80</p>
    </div>

    <!-- Shampoo -->
    <div class="product">
      <img src="https://images.pexels.com/photos/4239011/pexels-photo-4239011.jpeg" alt="Shampoo Bottle">
      <h3>Shampoo</h3>
      <p>₱150</p>
    </div>

  </div>
</section>

<section id="contact">
<h2>Contact</h2>
<p>Email: anilovrivera05@gmail.com</p>
<p>Phone: 09244329315</p>
</section>

<footer style="text-align:center;padding:10px;background:#222;color:white;">
© 2026 Anilov' Essentials
</footer>

<script>
function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
        </html>
